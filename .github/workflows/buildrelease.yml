name: Build & Release

# Triggers: push a version tag like v1.2.3, or run manually from the Actions tab.
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3) – used only for manual runs'
        required: false
        default: '1.0.0'
permissions:
  contents: write
jobs:
  build-and-release:
    name: Build C# backend → Electron installer
    runs-on: windows-latest          # NSIS packaging requires Windows

    steps:
      # ──────────────────────────────────────────────
      # 1. Check out the UI repository (this repo)
      # ──────────────────────────────────────────────
      - name: Checkout UI repository
        uses: actions/checkout@v4
        with:
          path: ui

      # ──────────────────────────────────────────────
      # 2. Check out the Server repository
      #    Uses a PAT stored as a secret so the runner
      #    can access a private repo if needed.
      # ──────────────────────────────────────────────
      - name: Checkout Server repository
        uses: actions/checkout@v4
        with:
          repository: yahiaelfellah/SchoolManagement.Server
          # Remove the token line below if the server repo is public:
          token: ${{ secrets.SERVER_REPO_TOKEN }}
          path: server

      # ──────────────────────────────────────────────
      # 3. Set up .NET SDK
      #    Adjust the dotnet-version to match your
      #    server project's target framework (e.g. 8.0).
      # ──────────────────────────────────────────────
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ──────────────────────────────────────────────
      # 4. Restore & Publish C# backend
      #    Self-contained + win-x64 so Electron can
      #    bundle the .exe without requiring .NET on
      #    the end-user's machine.
      #    Output lands in ui/publish/ which maps to
      #    extraResources.from in electron-builder.yml.
      # ──────────────────────────────────────────────
      - name: Restore NuGet packages
        working-directory: server
        run: dotnet restore

      - name: Publish C# backend (win-x64, self-contained)
        working-directory: server
        run: |
          dotnet publish `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output ${{ github.workspace }}/ui/publish

      # ──────────────────────────────────────────────
      # 5. Set up Node.js
      #    No cache: declared here — we handle caching
      #    manually below so a corrupt/missing cache
      #    never breaks the build.
      # ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ──────────────────────────────────────────────
      # 6. Restore npm cache (best-effort)
      #    Cache miss is fine — the install step below
      #    always runs regardless.
      # ──────────────────────────────────────────────
      - name: Restore npm cache
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: |
            ui/node_modules
            ~\AppData\Local\npm-cache
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: npm-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      # ──────────────────────────────────────────────
      # 7. Harden npm config
      #    - prefer-offline   → use cache when available
      #    - no-audit/fund    → skip non-essential network calls
      #    - engine-strict false → don't fail on engine mismatches
      # ──────────────────────────────────────────────
      - name: Configure npm
        shell: cmd
        run: |
          npm config set prefer-offline true
          npm config set audit false
          npm config set fund false
          npm config set engine-strict false
 
      # ──────────────────────────────────────────────
      # 8. Install npm dependencies
      #    Attempt 1: npm ci  (strict lockfile)
      #    Attempt 2: wipe node_modules + npm install
      #    Attempt 3: full cache-busted npm install
      #    Using cmd to avoid PowerShell execution
      #    policy issues on the Windows runner.
      # ──────────────────────────────────────────────
      - name: Install npm dependencies (attempt 1 — npm ci)
        id: npm-ci
        working-directory: ui
        shell: cmd
        continue-on-error: true
        run: npm ci --prefer-offline
 
      - name: Install npm dependencies (attempt 2 — npm install fallback)
        if: steps.npm-ci.outcome == 'failure'
        id: npm-install
        working-directory: ui
        shell: cmd
        continue-on-error: true
        run: |
          if exist node_modules rmdir /s /q node_modules
          npm install --prefer-offline
 
      - name: Install npm dependencies (attempt 3 — no cache)
        if: steps.npm-ci.outcome == 'failure' && steps.npm-install.outcome == 'failure'
        working-directory: ui
        shell: cmd
        run: |
          if exist node_modules rmdir /s /q node_modules
          npm cache clean --force
          npm install
 
      # ──────────────────────────────────────────────
      # 9. Rebuild native Electron modules
      #    Ensures native addons are compiled against
      #    the exact Electron ABI, not the system Node.
      # ──────────────────────────────────────────────
      - name: Rebuild native Electron modules
        working-directory: ui
        shell: cmd
        run: npx electron-rebuild --force
 
      # ──────────────────────────────────────────────
      # 9. Verify publish folder exists before build
      #    Catches C# publish failures early with a
      #    clear error message instead of a cryptic
      #    electron-builder packaging error.
      # ──────────────────────────────────────────────
      - name: Verify backend publish output exists
        shell: pwsh
        run: |
          $path = "${{ github.workspace }}/ui/publish"
          if (-not (Test-Path $path) -or (Get-ChildItem $path | Measure-Object).Count -eq 0) {
            Write-Error "Backend publish folder is missing or empty: $path"
            exit 1
          }
          Write-Host "Backend output OK — $($(Get-ChildItem $path -Recurse | Measure-Object).Count) files found"
 
      # ──────────────────────────────────────────────
      # 10. Build Vue frontend (Vite) + package with
      #     electron-builder → NSIS installer in
      #     ui/dist-electron/
      # ──────────────────────────────────────────────
      - name: Build Electron release
        working-directory: ui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional code-signing variables (leave unset to skip signing):
          # CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run electron:build -- --publish always
 
      # ──────────────────────────────────────────────
      # 11. Upload installer as a workflow artifact
      #    (useful even when publish:always is set,
      #     as a fallback / for manual-trigger runs)
      # ──────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchoolManagement-Installer
          path: |
            ui/dist-electron/*.exe
            ui/dist-electron/*.yml          # auto-update metadata
          if-no-files-found: error
          retention-days: 30
